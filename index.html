                    {/* CALCULATOR */}
                    <section id="calculator" className="py-16 px-4 bg-slate-900 text-white">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
                            <div>
                                <h2 className="text-2xl md:text-4xl font-bold mb-4 italic text-indigo-400">Estimate your Earnings</h2>
                                <p className="text-slate-400 text-sm mb-8">Calculations are based on a **{calcMode === 'conservative' ? '10%' : '18%'} conversion rate**.</p>
                                <div className="space-y-6 bg-white/5 p-6 rounded-2xl border border-white/10">
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-400 mb-2 uppercase">Number of Properties</label>
                                        <div className="flex items-center gap-4">
                                            <input type="range" min="1" max="15" value={numProperties} onChange={(e) => setNumProperties(parseInt(e.target.value))} className="flex-1 h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500" />
                                            <span className="text-2xl font-bold text-indigo-400 w-8">{numProperties}</span>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-400 mb-2 uppercase">Target City</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {['London', 'Geneva', 'Dakar'].map(city => (
                                                <button key={city} onClick={() => setSelectedCity(city)} className={`py-2 rounded-xl text-xs font-bold transition-all border ${selectedCity === city ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-white/5 border-white/10 text-slate-400'}`}>{city}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="pt-2">
                                        <label className="block text-xs font-semibold text-slate-400 mb-2 uppercase">Avg. Visitors per Property (Monthly)</label>
                                        <div className="flex items-center gap-4">
                                            <input type="range" min="1" max="15" value={monthlyBookings} onChange={(e) => setMonthlyBookings(parseInt(e.target.value))} className="flex-1 h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500" />
                                            <span className="text-2xl font-bold text-indigo-400 w-8">{monthlyBookings}</span>
                                        </div>
                                    </div>
                                    <div className="pt-2 border-t border-white/10">
                                        <div className="flex flex-col sm:flex-row gap-3">
                                            <button onClick={() => setCalcMode('conservative')} className={`flex-1 py-2 rounded-xl text-xs font-bold border uppercase tracking-wider ${calcMode === 'conservative' ? 'bg-slate-700 text-white' : 'bg-white/5 text-slate-400'}`}>Conservative</button>
                                            <button onClick={() => setCalcMode('optimistic')} className={`flex-1 py-2 rounded-xl text-xs font-bold border uppercase tracking-wider ${calcMode === 'optimistic' ? 'bg-indigo-600 text-white' : 'bg-white/5 text-slate-400'}`}>Optimist</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white rounded-[2rem] p-6 md:p-10 text-slate-900 shadow-2xl relative">
                                <div className="text-center mb-8">
                                    <p className="text-slate-500 font-bold uppercase tracking-widest text-xs mb-2">Host Net Yearly Profit (80% Share)</p>
                                    <div className="text-5xl md:text-7xl font-black text-indigo-600 tracking-tighter">£{yearlyPotential.toFixed(0)}</div>
                                    <button onClick={() => setShowBreakdown(true)} className="mt-3 inline-flex items-center gap-1.5 text-xs text-indigo-500 font-bold bg-indigo-50 px-3 py-1 rounded-full">
                                        View Spending Logic <Icons.Info size={12}/>
                                    </button>
                                </div>
                                <div className="space-y-3 mb-6">
                                    <div className="flex justify-between items-center text-sm p-4 bg-slate-50 rounded-2xl"><span className="text-slate-600">Visitor Groups</span><span className="font-bold">{totalVisitors}</span></div>
                                    <div className="flex justify-between items-center text-sm p-4 bg-indigo-50 rounded-2xl"><span className="text-indigo-900">Probable Leads / mo</span><span className="font-bold text-indigo-600">{expectedMonthlyLeads}</span></div>
                                    <div className="flex justify-between items-center text-sm p-4 bg-green-50 rounded-2xl"><span className="text-green-900">Host Payout</span><span className="font-bold text-green-600">£{monthlyPotential.toFixed(2)} /mo</span></div>
                                </div>
                                <a href="#join" className="block w-full bg-indigo-600 text-white text-center py-4 rounded-xl font-black text-lg">Start Earning</a>
                            </div>
                        </div>
                    </section>

                    {/* BLUEPRINT STATS */}
                    <section id="blueprint" className="py-16 px-4 bg-white">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-12">
                                <h2 className="text-3xl font-black italic">The London Blueprint</h2>
                                <p className="text-slate-500 text-sm mt-2">Example of how 3 visitor groups/month yield passive profit in a standard London accommodation.</p>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 max-w-5xl mx-auto">
                                <div className="bg-white border-2 border-green-500 rounded-[2rem] p-6 flex flex-col relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-2 bg-green-500 text-white text-[8px] font-bold uppercase rotate-45 translate-x-8 translate-y-2 w-28 text-center">Conversion</div>
                                    <h3 className="text-xl font-black mb-1">Group One</h3>
                                    <p className="text-slate-400 text-xs mb-6 italic">Family of 4 from NYC.</p>
                                    <div className="space-y-3 flex-1">
                                        <div className="p-3 bg-green-50 rounded-xl border border-green-100 flex justify-between items-center"><span className="text-xs font-bold text-green-900">Airport Transfer</span><span className="font-black text-green-600">+£8.50</span></div>
                                        <div className="p-3 bg-green-50 rounded-xl border border-green-100 flex justify-between items-center"><span className="text-xs font-bold text-green-900">Luggage (4 bags)</span><span className="font-black text-green-600">+£3.60</span></div>
                                    </div>
                                    <div className="mt-6 pt-4 border-t border-slate-100 flex justify-between items-center">
                                        <div><span className="text-[8px] font-black text-slate-400 uppercase">Host Net Yield</span><div className="text-xl font-black text-indigo-600">£12.10</div></div>
                                    </div>
                                </div>

                                <div className="bg-white border-2 border-slate-200 rounded-[2rem] p-6 flex flex-col relative overflow-hidden opacity-60">
                                    <div className="absolute top-0 right-0 p-2 bg-slate-400 text-white text-[8px] font-bold uppercase rotate-45 translate-x-8 translate-y-2 w-28 text-center">Missed Lead</div>
                                    <h3 className="text-xl font-black mb-1">Group Two</h3>
                                    <p className="text-slate-400 text-xs mb-6 italic">Business Solo traveler.</p>
                                    <div className="space-y-3 flex-1">
                                        <div className="p-3 bg-slate-50 rounded-xl border border-slate-100 flex justify-between items-center"><span className="text-xs font-bold text-slate-500">Spent on Uber (LHR)</span><span className="font-bold text-slate-500">£65.00</span></div>
                                        <div className="p-3 bg-red-50 rounded-xl border border-red-100 text-[10px] text-red-700">Spent outside the guide. Host missed out on a <strong>£10.00</strong> commission.</div>
                                    </div>
                                    <div className="mt-6 pt-4 border-t border-slate-100"><span className="text-[8px] font-black text-slate-400 uppercase">Host Net Yield</span><div className="text-xl font-black text-slate-400">£0.00</div></div>
                                </div>

                                <div className="bg-white border-2 border-slate-200 rounded-[2rem] p-6 flex flex-col relative overflow-hidden opacity-60">
                                    <div className="absolute top-0 right-0 p-2 bg-slate-400 text-white text-[8px] font-bold uppercase rotate-45 translate-x-8 translate-y-2 w-28 text-center">Missed Lead</div>
                                    <h3 className="text-xl font-black mb-1">Group Three</h3>
                                    <p className="text-slate-400 text-xs mb-6 italic">Couple from France.</p>
                                    <div className="space-y-3 flex-1">
                                        <div className="p-3 bg-slate-50 rounded-xl border border-slate-100 flex justify-between items-center"><span className="text-xs font-bold text-slate-500">Walk-in Tour Booking</span><span className="font-bold text-slate-500">£120.00</span></div>
                                        <div className="p-3 bg-red-50 rounded-xl border border-red-100 text-[10px] text-red-700">Booked via street vendor. Host missed out on a <strong>£15.00</strong> commission.</div>
                                    </div>
                                    <div className="mt-6 pt-4 border-t border-slate-100"><span className="text-[8px] font-black text-slate-400 uppercase">Host Net Yield</span><div className="text-xl font-black text-slate-400">£0.00</div></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* LIVE LEAD FORM */}
                    <section id="join" className="py-16 px-4 max-w-4xl mx-auto text-center">
                        {submitted ? (
                            <div className="bg-green-50 p-10 rounded-[2rem] border border-green-100">
                                <Icons.CheckCircle size={48} className="text-green-500 mx-auto mb-4" />
                                <h2 className="text-2xl font-extrabold text-green-900 mb-2">Welcome to SuperGuide</h2>
                                <p className="text-green-700 font-medium">Onboarding details sent to your inbox!</p>
                            </div>
                        ) : (
                            <div className="bg-indigo-600 rounded-[2rem] p-8 md:p-16 text-white shadow-2xl">
                                <h2 className="text-2xl md:text-4xl font-black mb-6 italic tracking-tight">Professionalize Your Hosting</h2>
                                <form onSubmit={handleSubmit} className="space-y-4 max-w-md mx-auto">
                                    <input type="email" required name="email" placeholder="Email Address" className="w-full bg-white/10 border border-white/20 rounded-xl py-4 px-6 placeholder:text-indigo-200 text-base outline-none focus:ring-2 focus:ring-white transition-all" value={email} onChange={(e) => setEmail(e.target.value)} />
                                    <input type="text" required name="city" placeholder={`Property City (e.g. ${selectedCity})`} className="w-full bg-white/10 border border-white/20 rounded-xl py-4 px-6 placeholder:text-indigo-200 text-base outline-none focus:ring-2 focus:ring-white transition-all" value={location} onChange={(e) => setLocation(e.target.value)} />
                                    <button type="submit" className="w-full bg-white text-indigo-600 font-black py-4 rounded-xl text-lg hover:bg-slate-100 transition-all shadow-lg">Get Early Access</button>
                                </form>
                            </div>
                        )}
                    </section>
                </div>
            );
        };

        const root = ReactRoot = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LandingPage />);
    </script>
</body>
</html>
